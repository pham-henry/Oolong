<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oolong — Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sage:     '#7d8c72',
            cream:    '#ede4d0',
            bark:     '#3d2b1f',
            latte:    '#c4a882',
            espresso: '#2a1a0e',
          },
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body:    ['Lato', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    /* stuff Tailwind can't do inline */
    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px #3d2b1f inset !important;
      -webkit-text-fill-color: #f0e6d6 !important;
    }
    input::placeholder { color: rgba(196,168,130,0.38); }
    input:focus {
      outline: none;
      border-color: rgba(196,168,130,0.55) !important;
      box-shadow: 0 0 0 3px rgba(196,168,130,0.1);
    }
    .btn-primary {
      background: linear-gradient(135deg, #c4a882, #a07858);
      transition: filter 0.15s, transform 0.15s;
    }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-primary:active { transform: none; }
    .btn-google { transition: background 0.2s, border-color 0.2s; }
    .btn-google:hover { background: rgba(255,255,255,0.1); border-color: rgba(196,168,130,0.5) !important; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-sage font-body p-6">

  <!-- Card -->
  <div class="flex rounded-2xl overflow-hidden shadow-2xl" style="width:820px; height:534px;">

    <!-- LEFT: Logo -->
    <div class="flex-shrink-0 bg-cream flex items-center justify-center p-6" style="width:344px;">
      <img src="https://media.discordapp.net/attachments/1478586133419131004/1498217767122501754/Oolong.png?ex=69f10447&is=69efb2c7&hm=63458b52423131d0816b10af052230f3825821c2cc3bab972cf33e3465c14786&=&format=webp&quality=lossless&width=1032&height=1290" 
      alt="Oolong" class="w-full max-w-[300px] object-contain"/>
    </div>

    <!-- RIGHT: Form -->
    <div class="flex-1 bg-bark flex flex-col justify-center px-9 py-10 min-w-0">

      <h1 class="font-display text-2xl font-bold text-[#f0e6d6] mb-1">Welcome!</h1>
      <p class="text-xs italic text-latte/70 mb-6">please create an account</p>

      <!-- Email -->
      <div class="mb-3.5">
        <label class="block text-[0.65rem] uppercase tracking-widest text-latte/75 mb-1.5">Email Address</label>
        <input type="email" placeholder="example@gmail.com"
               class="w-full bg-white/[0.07] border border-latte/20 rounded-lg px-3.5 py-2.5 text-sm text-[#f0e6d6] font-body"/>
      </div>

      <!-- Password -->
      <div class="mb-2">
        <label class="block text-[0.65rem] uppercase tracking-widest text-latte/75 mb-1.5">Password</label>
        <div class="relative">
          <input type="password" placeholder="••••••••" id="pwField"
                 class="w-full bg-white/[0.07] border border-latte/20 rounded-lg px-3.5 py-2.5 pr-10 text-sm text-[#f0e6d6] font-body"/>
          <button onclick="togglePw()" type="button"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-latte/45 hover:text-latte/80 transition-colors flex">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Remember / Forgot -->
      <div class="flex items-center justify-between mb-5">
       
      </div>

      <!-- Sign in -->
      <button class="btn-primary w-full py-3 rounded-lg text-espresso font-bold text-sm tracking-wide mb-2.5">
        Sign up
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-1">
        <div class="flex-1 h-px bg-latte/15"></div>
        <span class="text-[0.68rem] text-latte/30">or</span>
        <div class="flex-1 h-px bg-latte/15"></div>
      </div>

      <!-- Google -->
      <button class="btn-google w-full mt-2.5 py-2.5 rounded-lg border border-latte/22 bg-white/5 text-[#e0d3c0] text-sm flex items-center justify-center gap-2.5">
        <svg width="15" height="15" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.85L38.4 6.1C34.53 2.32 29.57 0 24 0 14.72 0 6.73 5.48 2.69 13.44l7.45 5.78C12.21 13.26 17.66 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.14 28.78A14.6 14.6 0 019.5 24c0-1.65.28-3.25.77-4.78L2.82 13.44A23.93 23.93 0 000 24c0 3.77.9 7.34 2.69 10.56l7.45-5.78z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.34 0-11.79-3.76-13.86-9.22l-7.45 5.78C6.73 42.52 14.72 48 24 48z"/>
        </svg>
        Sign in with Google
      </button>

    

    </div>
  </div>

  <script>
    function togglePw() {
      const f = document.getElementById('pwField');
      const icon = document.getElementById('eyeIcon');
      if (f.type === 'password') {
        f.type = 'text';
        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>`;
      } else {
        f.type = 'password';
        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>`;
      }
    }
  </script>
</body>
</html>
