services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oolong
      POSTGRES_PASSWORD: oolong_pass
      POSTGRES_DB: oolong
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oolong"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Ollama (local LLM) ──────────────────────────────────────────────────────
  # Serves the Smart Assistant. The app falls back to rule-based answers if
  # Ollama is unreachable, so this service is not required for basic operation.
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  # ── Ollama model pull (one-shot init) ───────────────────────────────────────
  # Runs once after Ollama is healthy and pulls llama3 (~4.7 GB on first run).
  # Skipped on subsequent runs because the model is cached in the ollama_data volume.
  # To change the model: set OLLAMA_MODEL and update the pull command below.
  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3"]
    restart: "no"

  # ── Backend API server ──────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://oolong:oolong_pass@postgres:5432/oolong
      JWT_SECRET: ${JWT_SECRET:-changeme-set-a-real-secret-in-production}
      NODE_ENV: production
      PORT: 5000
      # Points to the ollama service above. Change OLLAMA_MODEL to swap models.
      OLLAMA_URL: http://ollama:11434/api/generate
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-60000}
      # Set SEED_DB=true on first run to populate demo data:
      #   SEED_DB=true docker compose up --build
      SEED_DB: ${SEED_DB:-false}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
